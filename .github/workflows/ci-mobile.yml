name: CI — Mobile

# ─────────────────────────────────────────────────────────────────────────────
# Watchr — Mobile typecheck & lint
#
# Runs on every push (all branches) and on pull requests targeting master/develop.
# Steps: pnpm install → tsc --noEmit → eslint
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
  pull_request:
    branches: [master, develop]

jobs:
  mobile-ci:
    name: Typecheck & Lint
    runs-on: [self-hosted]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm --filter @watchr/i18n-languages build

      - name: Typecheck
        run: pnpm --filter mobile typecheck

      - name: Lint
        run: pnpm --filter mobile lint
