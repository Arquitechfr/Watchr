name: CI — Backend

# ─────────────────────────────────────────────────────────────────────────────
# Watchr — Backend typecheck & lint
#
# Runs on every push (all branches) and on pull requests targeting master/develop.
# Steps: pnpm install → tsc --noEmit → eslint
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
  pull_request:
    branches: [master, develop]

jobs:
  backend-ci:
    name: Typecheck & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Prepare @watchr/i18n-languages tarball
        run: |
          cd packages/i18n-languages
          npm install --no-save --no-package-lock typescript@5.5.2 date-fns
          npx tsc
          npm pack
          mv watchr-i18n-languages-1.0.0.tgz ../../apps/backend/
          rm -rf node_modules
          cd ../..

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build shared packages
        run: pnpm --filter @watchr/i18n-languages build

      - name: Typecheck
        run: pnpm --filter backend typecheck

      - name: Lint
        run: pnpm --filter backend lint

