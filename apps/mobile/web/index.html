<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <title>Watchr — Track your TV shows & movies</title>
    <meta name="description" content="Watchr is a modern tracker for TV shows and movies. Track your watch status, rate episodes, discover new content, and import your TV Time data." />
    <meta name="theme-color" content="#1A1614" />
    <link rel="canonical" href="https://app.watchr.me" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Watchr" />
    <meta property="og:title" content="Watchr — Track your TV shows & movies" />
    <meta property="og:description" content="Track your watch status, rate episodes, discover new content, and import your TV Time data." />
    <meta property="og:url" content="https://app.watchr.me" />
    <meta property="og:image" content="https://app.watchr.me/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Watchr — Track your TV shows & movies" />
    <meta name="twitter:description" content="Track your watch status, rate episodes, discover new content, and import your TV Time data." />
    <meta name="twitter:image" content="https://app.watchr.me/og-image.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Redirect Android smartphones to Play Store -->
    <script>
      (function () {
        try {
          if (sessionStorage.getItem("watchr_web_bypass") === "1") return;
        } catch (e) {}
        var ua = navigator.userAgent || "";
        var isAndroidPhone =
          /Android/i.test(ua) && /Mobile/i.test(ua) && !/Tablet/i.test(ua);
        var isBot = /bot|crawler|spider|googlebot|bingbot|yandex/i.test(ua);
        var bypass = /[?&]web=1/.test(window.location.search);
        if (bypass) {
          try {
            sessionStorage.setItem("watchr_web_bypass", "1");
          } catch (e) {}
          return;
        }
        if (isAndroidPhone && !isBot) {
          window.location.replace(
            "https://play.google.com/store/apps/details?id=com.watchr.app",
          );
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
